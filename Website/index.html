<!doctype html>
<html lang="en" class="scroll-smooth cursor-none">

<head>
  <meta charset="utf-8">
  <title>Zygnal Tech Solutions</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="Zygnal Tech Solutions designs and engineers premium software architectures, mobile apps, and machine learning models to bring the future to the present.">
  <meta name="keywords"
    content="Zygnal Tech, Software Development, AI, Machine Learning, UI/UX Design, App Development, Futuristic Tech Company">
  <meta name="author" content="Zygnal Tech Solutions">
  <meta property="og:title" content="Zygnal Tech Solutions | Intelligence Software">
  <meta property="og:description" content="Engineering scalable, AI-powered digital experiences that push boundaries.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Preload core fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body class="bg-background text-text-main overflow-x-hidden selection:bg-primary/30 selection:text-white">

  <!-- Updated Preloader with Favicon and Orange/Yellow Rings -->
  <div id="preloader"
    class="fixed inset-0 z-[99999] bg-white flex flex-col items-center justify-center transition-opacity duration-1000">
    <div class="relative w-28 h-28 flex items-center justify-center">
      <!-- Spinning Rings -->
      <div
        class="absolute inset-0 border-t-4 border-orange-500 rounded-full animate-spin shadow-[0_0_15px_rgba(234,88,12,0.3)]">
      </div>
      <div class="absolute inset-2 border-r-4 border-yellow-400 rounded-full animate-spin"
        style="animation-direction: reverse; animation-duration: 1.5s; box-shadow: 0 0 15px rgba(234,179,8,0.2);"></div>

      <!-- Favicon Logo in Center -->
      <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center p-1 shadow-inner overflow-hidden">
        <img src="favicon.ico" alt="Zygnal Logo" class="w-full h-full object-contain rounded-full">
      </div>
    </div>
    <div class="mt-10 text-[10px] font-black uppercase tracking-[0.5em] text-orange-600 animate-pulse">Initializing
      Core...</div>
  </div>

  <app-root></app-root>

  <script>
    // Remove preloader smoothly after load
    window.addEventListener('load', () => {
      const preloader = document.getElementById('preloader');
      setTimeout(() => {
        preloader.style.opacity = '0';
        setTimeout(() => {
          preloader.style.display = 'none';
        }, 1000);
      }, 500); // Minimum view time
    });
  </script>
</body>

</html>
